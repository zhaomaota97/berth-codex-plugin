packages:
  - "."

# Match the platform's 24-hour supply-chain observation window during local and
# free validation, instead of discovering a too-new dependency in paid Build.
minimumReleaseAge: 1440

# Eve's audited native transitive dependencies. Keep this list exact: never use
# wildcards and do not add packages that are absent from pnpm-lock.yaml.
allowBuilds:
  "@mongodb-js/zstd": true
  "node-liblzma": true
